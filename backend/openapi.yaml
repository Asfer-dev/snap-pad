openapi: 3.0.0
info:
  title: SnapPad API Docs
  version: 1.0.0
  description: Interactive API documentation for the SnapPad Markdown Note-taking Application
servers:
  - url: http://localhost:5000
    description: Development Server
paths:
  /api/health:
    get:
      summary: Verify API health
      description: Returns a simple success JSON structure to confirm the server is responsive.
      responses:
        '200':
          description: Server is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Welcome to the SnapPad API!

  /api/auth/register:
    post:
      summary: Register a new user
      operationId: registerUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  example: Asfer
                email:
                  type: string
                  format: email
                  example: asfer@example.com
                password:
                  type: string
                  minLength: 8
                  example: SecurePassword123
      responses:
        '201':
          description: User successfully registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Validation failure or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      summary: Authenticate an existing user
      operationId: loginUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: asfer@example.com
                password:
                  type: string
                  example: SecurePassword123
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          description: Invalid email or password credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/folders:
    post:
      summary: Create a folder
      security:
        - BearerAuth: []
      tags:
        - Folders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: Engineering Notes
                parent_folder_id:
                  type: string
                  format: uuid
                  nullable: true
                  example: null
      responses:
        '201':
          description: Folder successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Folder'
        '400':
          description: Invalid payload or bad parent assignment
        '401':
          description: Unauthorized
    get:
      summary: Retrieve all user folders
      security:
        - BearerAuth: []
      tags:
        - Folders
      parameters:
        - name: includeDeleted
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Folder'

  /api/folders/{id}:
    patch:
      summary: Update folder details
      security:
        - BearerAuth: []
      tags:
        - Folders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                parent_folder_id:
                  type: string
                  format: uuid
                  nullable: true
      responses:
        '200':
          description: Folder successfully updated
        '403':
          description: Forbidden - Not the owner
        '404':
          description: Folder not found
    delete:
      summary: Soft delete a folder recursively
      security:
        - BearerAuth: []
      tags:
        - Folders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Folder successfully soft-deleted
        '404':
          description: Folder not found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        name:
          type: string
          example: Asfer
        email:
          type: string
          format: email
          example: asfer@example.com
        created_at:
          type: string
          format: date-time
          example: '2026-07-15T18:45:00.000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-07-15T18:45:00.000Z'
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Email already registered.
    Folder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        user_id:
          type: string
          format: uuid
        parent_folder_id:
          type: string
          format: uuid
          nullable: true
        is_deleted:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
